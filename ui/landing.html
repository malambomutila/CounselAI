<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CounselAI — Sign in</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:wght@300;400&display=swap');
    body {
      margin: 0;
      min-height: 100vh;
      background: #0e0e0e;
      color: #e8e2d9;
      font-family: 'Source Serif 4', Georgia, serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    h1 { font-family: 'Playfair Display', serif; font-weight: 700; letter-spacing: -0.01em; }
    .subtitle { opacity: 0.7; max-width: 32rem; text-align: center; line-height: 1.5; }
    #clerk-mount { margin-top: 2rem; min-height: 480px; }
    .footer { margin-top: 3rem; opacity: 0.4; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>CounselAI</h1>
  <p class="subtitle">
    Five AI legal specialists analyse your case from every angle so you walk
    into proceedings fully prepared. Sign in to begin.
  </p>
  <div id="clerk-mount"></div>
  <p class="footer">For legal research only — not legal advice.</p>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="__CLERK_PUBLISHABLE_KEY__"
    src="__CLERK_FRONTEND_API_URL__/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    type="text/javascript"
  ></script>

  <script>
    window.addEventListener("load", async () => {
      // Wait for clerk-js to attach itself to the global Clerk object
      while (!window.Clerk) await new Promise(r => setTimeout(r, 50));
      await window.Clerk.load();

      if (window.Clerk.user) {
        // Already signed in → straight to the app
        window.location.replace("/app");
        return;
      }

      const mount = document.getElementById("clerk-mount");
      window.Clerk.mountSignIn(mount, {
        afterSignInUrl: "/app",
        afterSignUpUrl: "/app",
        appearance: {
          variables: {
            colorBackground: "#141414",
            colorPrimary: "#3b82f6",
            colorText: "#e8e2d9",
            colorInputBackground: "#1a1a1a",
            colorInputText: "#e8e2d9",
            fontFamily: "'Source Serif 4', Georgia, serif"
          }
        }
      });
    });
  </script>
</body>
</html>
